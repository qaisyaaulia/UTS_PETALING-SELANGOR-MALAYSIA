<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Tematik Petaling - Qaisya Aulia Maharani</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --bg-light: #f8f9fa;
            --border: #dee2e6;
            --edu: #2196F3;
            --health: #F44336;
            --fin: #4CAF50;
            --loc: #FF9800;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: var(--bg-light);
        }

        #sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 2000;
        }

        .sidebar-header {
            padding: 25px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .sidebar-header h3 {
            margin: 0;
            font-size: 18px;
        }

        .sidebar-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .stat-card {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-indicator {
            width: 4px;
            height: 30px;
            border-radius: 2px;
        }

        .stat-info span {
            display: block;
            font-size: 10px;
            color: #888;
        }

        .stat-info b {
            font-size: 15px;
        }

        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* LEGENDA */
        .info.legend {
            padding: 10px;
            background: white;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            line-height: 20px;
            font-size: 12px;
        }

        .info.legend i {
            width: 12px;
            height: 12px;
            float: left;
            margin-right: 8px;
            margin-top: 4px;
            border-radius: 50%;
        }

        /* NORTH ARROW - FIX CLICKABLE */
        .north-arrow-ctrl {
            background: white;
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            cursor: pointer !important;
            pointer-events: auto !important;
            /* Supaya bisa diklik */
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .north-arrow-ctrl:hover {
            transform: scale(1.1);
            background: #f0f0f0;
            border: 2px solid var(--primary);
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: white;
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .btn-fit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <aside id="sidebar">
        <div class="sidebar-header">
            <h3>Peta Tematik Petaling</h3>
            <p>Sistem Informasi Geografis</p>
        </div>
        <div class="sidebar-content">
            <input type="text" id="search"
                style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;"
                placeholder="Cari fasilitas...">
            <div id="search-results"></div>
            <h4>STATISTIK DATA</h4>
            <div class="stat-card">
                <div class="stat-indicator" style="background: var(--edu)"></div>
                <div class="stat-info"><span>Pendidikan</span><b id="count-edu">0</b></div>
            </div>
            <div class="stat-card">
                <div class="stat-indicator" style="background: var(--health)"></div>
                <div class="stat-info"><span>Kesehatan</span><b id="count-health">0</b></div>
            </div>
            <div class="stat-card">
                <div class="stat-indicator" style="background: var(--fin)"></div>
                <div class="stat-info"><span>Finansial</span><b id="count-fin">0</b></div>
            </div>
            <div class="stat-card">
                <div class="stat-indicator" style="background: var(--loc)"></div>
                <div class="stat-info"><span>Lokalitas (Area)</span><b id="count-loc">0</b></div>
            </div>
            <button class="btn-fit" onclick="fitMap()">Reset Tampilan Peta</button>
            <div style="font-size: 10px; color: #999; margin-top: 20px; text-align: center;">
                <b>Qaisya Aulia Maharani</b><br>Tugas 2 Web GIS
            </div>
        </div>
    </aside>

    <main id="map-container">
        <div id="loading-overlay">
            <p>Sinkronisasi Data...</p>
        </div>
        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([3.126, 101.59], 12);
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const layers = { border: L.layerGroup(), education: L.layerGroup(), healthcare: L.layerGroup(), financial: L.layerGroup(), localities: L.layerGroup() };
        const COLORS = { education: '#2196F3', healthcare: '#F44336', financial: '#4CAF50', localities: '#FF9800' };
        const LABELS = { education: 'Pendidikan', healthcare: 'Kesehatan', financial: 'Finansial', localities: 'Lokalitas' };
        let searchIndex = [];

        async function loadData(cat, path) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error("File tidak ditemukan");
                const data = await response.json();

                if (cat !== 'border') {
                    const id = { education: 'edu', healthcare: 'health', financial: 'fin', localities: 'loc' }[cat];
                    document.getElementById(`count-${id}`).innerText = data.features.length;
                }

                L.geoJSON(data, {
                    style: () => {
                        if (cat === 'border') {
                            return {
                                color: '#000000', // Hitam
                                weight: 2.5,
                                dashArray: '5, 8', // Garis titik-titik (putus-putus)
                                fillOpacity: 0, // Dalamnya kosong
                                interactive: false
                            };
                        }
                        return {
                            color: COLORS[cat],
                            weight: 2,
                            fillOpacity: cat === 'localities' ? 0.3 : 0.9,
                            fillColor: COLORS[cat]
                        };
                    },
                    pointToLayer: (f, latlng) => {
                        if (cat === 'border') return null;
                        return L.circleMarker(latlng, { radius: 6, fillColor: COLORS[cat], color: "#fff", weight: 1, fillOpacity: 0.9 });
                    },
                    onEachFeature: (f, layer) => {
                        if (cat === 'border') return;
                        const p = f.properties;
                        const name = p.name || p.amenity || "Fasilitas";
                        layer.bindPopup(`<b style="color:${COLORS[cat]}">${LABELS[cat]}</b><br><b>${name}</b>`);
                        searchIndex.push({ name: String(name), layer, cat: LABELS[cat] });
                    }
                }).addTo(layers[cat]);
                layers[cat].addTo(map);
            } catch (e) { console.error("Gagal muat " + cat, e); }
        }

        // --- PATH FILE (Pastikan Huruf Besar/Kecil Sama Dengan Nama Foldermu) ---
        Promise.all([
            loadData('border', 'localities%20petaling/clipping_boundary.geojson'),
            loadData('education', 'education/education.geojson'),
            loadData('healthcare', 'healthcare%20petaling/healthcare.petaling.geojson'),
            loadData('financial', 'Financial%20petaling/Financial.petaling.geojson'),
            loadData('localities', 'localities%20petaling/localities.petaling.geojson')
        ]).then(() => {
            document.getElementById('loading-overlay').style.display = 'none';
            L.control.layers(null, {
                "<b>Batas Wilayah</b>": layers.border,
                "Pendidikan": layers.education,
                "Kesehatan": layers.healthcare,
                "Finansial": layers.financial,
                "Lokalitas": layers.localities
            }, { collapsed: false, position: 'topright' }).addTo(map);

            // Pastikan border di paling belakang agar tidak menutupi klik marker
            layers.border.eachLayer(l => l.bringToBack());
            fitMap();
        });

        // LEGENDA
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'info legend');
            div.innerHTML = '<b>Legenda</b><br>';
            for (let key in COLORS) { div.innerHTML += `<i style="background:${COLORS[key]}"></i>${LABELS[key]}<br>`; }
            return div;
        };
        legend.addTo(map);

        // NORTH ARROW (RESET VIEW BUTTON)
        const north = L.control({ position: 'bottomleft' });
        north.onAdd = function () {
            const div = L.DomUtil.create('div', 'north-arrow-ctrl');
            div.innerHTML = '<img src="https://cdn-icons-png.flaticon.com/512/2619/2619335.png" width="30" title="Reset Tampilan">';

            // Event Click Langsung
            L.DomEvent.disableClickPropagation(div); // Penting agar tidak nembus ke peta
            div.onclick = function () {
                console.log("Resetting view...");
                fitMap();
            };
            return div;
        };
        north.addTo(map);

        function fitMap() {
            const activeLayers = [];
            for (let key in layers) {
                if (key !== 'border' && map.hasLayer(layers[key])) {
                    layers[key].eachLayer(l => activeLayers.push(l));
                }
            }
            if (activeLayers.length > 0) {
                const group = L.featureGroup(activeLayers);
                map.fitBounds(group.getBounds(), { padding: [50, 50], animate: true });
            } else {
                map.setView([3.126, 101.59], 12);
            }
        }

        // Search Logic
        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const res = document.getElementById('search-results');
            res.innerHTML = '';
            if (val.length < 2) return;
            searchIndex.filter(i => i.name.toLowerCase().includes(val)).slice(0, 5).forEach(m => {
                const d = document.createElement('div');
                d.style = "padding:8px; cursor:pointer; border-bottom:1px solid #eee; font-size:12px; background:white;";
                d.innerHTML = `<b>${m.name}</b><br><small>${m.cat}</small>`;
                d.onclick = () => { m.layer.openPopup(); map.setView(m.layer.getLatLng ? m.layer.getLatLng() : m.layer.getBounds().getCenter(), 15); };
                res.appendChild(d);
            });
        });
    </script>
</body>

</html>
